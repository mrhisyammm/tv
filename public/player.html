<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
video{width:100%;height:100%;object-fit:contain;background:#000}
.error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#aaa;font-family:sans-serif;font-size:14px;gap:8px;background:#000}
.error button{background:#E50914;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:13px;cursor:pointer;font-family:sans-serif}
.error button:hover{background:#b80710}
.spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#00e5ff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;gap:10px;color:#888;font-family:sans-serif;font-size:13px}
</style>
</head>
<body>
<video id="v" controls autoplay playsinline></video>
<div class="loading" id="load"><div class="spinner"></div><span>Loading stream...</span></div>
<div class="error" id="err" style="display:none">
  <span id="err-msg">Stream failed</span>
  <button id="retry-btn">Retry with Proxy</button>
</div>
<script>
(function(){
  var params = new URLSearchParams(window.location.search);
  var src = params.get('src') || '';
  var proxy = params.get('proxy') || '';
  if (!src) { showError('No stream URL provided'); return; }

  var video = document.getElementById('v');
  var loadEl = document.getElementById('load');
  var errEl = document.getElementById('err');
  var retryBtn = document.getElementById('retry-btn');
  var tried = { direct: false, proxy: false };
  var PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url='
  ];
  var proxyIdx = 0;

  function play(url, label) {
    loadEl.style.display = 'flex';
    errEl.style.display = 'none';

    if (window._hls) { window._hls.destroy(); window._hls = null; }
    video.removeAttribute('src');

    if (Hls.isSupported()) {
      var hls = new Hls({ enableWorker: true, lowLatencyMode: true });
      window._hls = hls;
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        loadEl.style.display = 'none';
        video.play().catch(function(){});
      });
      hls.on(Hls.Events.ERROR, function(e, d) {
        if (d.fatal) { showError((label || 'Stream') + ' failed'); }
      });
      setTimeout(function() {
        if (loadEl.style.display !== 'none' && video.readyState < 2) {
          showError('Stream timed out');
        }
      }, 12000);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', function() {
        loadEl.style.display = 'none';
        video.play().catch(function(){});
      });
      video.addEventListener('error', function() { showError('Stream error'); });
    } else {
      showError('HLS not supported');
    }
  }

  function showError(msg) {
    loadEl.style.display = 'none';
    errEl.style.display = 'flex';
    document.getElementById('err-msg').textContent = msg;
    if (proxyIdx < PROXIES.length) {
      retryBtn.textContent = 'Retry with Proxy ' + (proxyIdx + 1);
      retryBtn.style.display = 'inline-block';
    } else {
      retryBtn.style.display = 'none';
    }
  }

  retryBtn.addEventListener('click', function() {
    if (proxyIdx < PROXIES.length) {
      var proxyUrl = PROXIES[proxyIdx] + encodeURIComponent(src);
      proxyIdx++;
      play(proxyUrl, 'Proxy ' + proxyIdx);
    }
  });

  // Start: check if proxy param is set
  if (proxy === 'allorigins') {
    proxyIdx = 1;
    play(PROXIES[0] + encodeURIComponent(src), 'Proxy 1');
  } else if (proxy === 'corsproxy') {
    proxyIdx = 2;
    play(PROXIES[1] + encodeURIComponent(src), 'Proxy 2');
  } else {
    play(src, 'Direct');
  }
})();
</script>
</body>
</html>
