<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF1A1A"/>
      <stop offset="100%" stop-color="#B80710"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle inner shine -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)" opacity="0.15" style="mix-blend-mode:overlay"/>
  <!-- H letter with play-triangle crossbar -->
  <g filter="url(#shadow)">
    <!-- Left pillar of H -->
    <rect x="100" y="96" width="72" height="320" rx="12" fill="#fff"/>
    <!-- Right pillar of H -->
    <rect x="340" y="96" width="72" height="320" rx="12" fill="#fff"/>
    <!-- Play triangle as crossbar (pointing right) -->
    <polygon points="192,210 192,302 310,256" fill="#fff"/>
  </g>
</svg>
